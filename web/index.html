<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Dev</title>
  <!-- markdown + 代码高亮：本地内置（vendor/），不再联网，启动快、可离线 -->
  <link rel="stylesheet" href="vendor/github-dark.min.css" />
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <!-- Mermaid（vendor/mermaid.min.js，约 3MB）改为懒加载：见 app.js ensureMermaid()，
       仅当出现 ```mermaid 代码块时才动态加载，避免每次启动都解析它 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-brand">Hermes Dev</span>
      <div class="sidebar-actions">
        <button id="new-session" class="icon-btn" title="新建空白会话" aria-label="新建空白会话">
          <span class="ico" data-icon="plus" data-sz="15"></span>
        </button>
        <button id="open-project" class="icon-btn" title="打开已有项目文件夹（起新会话）"
                aria-label="打开已有项目文件夹">
          <span class="ico" data-icon="folder-open" data-sz="15"></span>
        </button>
      </div>
    </div>
    <div class="sidebar-search">
      <span class="search-ico" aria-hidden="true">
        <span class="ico" data-icon="search" data-sz="12"></span>
      </span>
      <input id="session-search" class="session-search" type="text" placeholder="搜索会话 / 消息…" />
      <span class="search-kbd">Ctrl K</span>
    </div>
    <div id="msg-search" class="msg-search" hidden></div>
    <ul id="session-list" class="session-list"></ul>
  </aside>

  <div id="drag-left" class="drag-handle" title="拖拽调整会话栏宽度"></div>

  <div class="main-col">
    <header class="topbar">
      <span class="title is-placeholder" id="app-title">未打开项目</span>
      <div class="controls">
        <button id="running-chip" class="running-chip" title="正在运行的会话——点击跳到下一个" hidden></button>
        <span id="usage-chip" class="usage-chip" title="本会话累计用量" hidden></span>
        <div class="model-menu-wrap">
          <button id="model-menu-btn" class="model-menu-btn" title="选择主模型 / 委派模型 / 评审模型" aria-haspopup="true" aria-expanded="false">
            <span class="ico" data-icon="cpu" data-sz="15"></span>
            <span id="model-menu-label">模型</span>
            <span class="mm-caret">▾</span>
          </button>
          <div id="model-menu" class="model-menu" hidden>
            <div class="mm-sec">
              <div class="mm-sec-h">主模型</div>
              <label class="mm-row"><span>主模型</span><select id="model-select"></select></label>
              <label class="mm-row"><span>委派模型</span><select id="subagent-select" title="委派子任务（researcher 等）用的模型；跟随主模型 = 用主模型"></select></label>
            </div>
            <div class="mm-sec">
              <div class="mm-sec-h">评审模型 <span class="mm-hint">异构可降低两个评审员的错误相关性</span></div>
              <div id="mm-review-models"></div>
            </div>
          </div>
        </div>
        <button id="theme-toggle" class="icon-btn" title="切换明暗主题" aria-label="切换明暗主题"></button>
        <button id="settings-btn" class="icon-btn" title="设置 · API Key" aria-label="设置">
          <span class="ico" data-icon="settings" data-sz="15"></span>
        </button>
      </div>
    </header>

    <div id="task-bar" class="task-bar" hidden>
      <button id="task-toggle" class="task-toggle" aria-expanded="true">
        <span class="task-caret">▾</span>
        <span class="task-title">任务清单</span>
        <span id="task-progress" class="task-progress"></span>
      </button>
      <ul id="task-list" class="task-list"></ul>
    </div>

    <div class="chat-area">
      <div id="find-bar" class="find-bar" hidden>
        <input id="find-input" type="text" placeholder="在本对话中查找…" />
        <span id="find-count" class="find-count">0/0</span>
        <button id="find-prev" class="find-nav" title="上一个 (Shift+Enter)" aria-label="上一个">▲</button>
        <button id="find-next" class="find-nav" title="下一个 (Enter)" aria-label="下一个">▼</button>
        <button id="find-close" class="find-nav" title="关闭 (Esc)" aria-label="关闭">✕</button>
      </div>
      <main id="chat" class="chat"></main>
      <div id="chat-index" class="chat-index" title="会话导航：点刻度跳到对应消息"></div>
      <button id="scroll-bottom-btn" class="scroll-bottom-btn" title="回到最新" aria-label="回到最新">
        <span class="ico" data-icon="arrow-down" data-sz="16"></span>
      </button>
    </div>

    <footer class="composer">
      <div id="slash-menu" class="slash-menu" hidden></div>
      <div id="mention-menu" class="slash-menu mention-menu" hidden></div>
      <div id="attachments" class="attachments"></div>
      <div class="composer-row">
        <button id="attach-btn" class="icon-btn attach-btn" title="添加图片 / 文档" aria-label="添加附件">
          <span class="ico" data-icon="paperclip" data-sz="15"></span>
        </button>
        <button id="plan-btn" class="icon-btn plan-btn" title="规划模式：只勘察并产出计划，不改文件 / 不执行命令（FR-11.5）" aria-label="规划模式">
          <span class="ico" data-icon="clipboard-list" data-sz="15"></span>
        </button>
        <button id="review-btn" class="icon-btn review-btn" title="评审：把规划方案拆成关键决策（技术/规划合理性/范围/待确认项），务实⟷严谨两员多维度评审收敛成四态共识，未决清零并签字后才放行编码（ADR 0019）" aria-label="评审">
          <span class="ico" data-icon="check-square" data-sz="15"></span>
        </button>
        <input id="file-input" type="file" multiple hidden
          accept="image/*,.pdf,.txt,.md,.py,.js,.ts,.json,.yaml,.yml,.html,.css,.csv,.log" />
        <textarea id="input" rows="1"
          placeholder="输入消息，Enter 发送，Shift+Enter 换行；输入 / 唤起命令；可粘贴/拖拽图片或文档"></textarea>
        <button id="send" title="发送" aria-label="发送"><span class="ico" data-icon="send" data-sz="16"></span></button>
        <button id="stop" class="stop-btn" title="停止当前对话的运行" aria-label="停止" hidden><span class="ico" data-icon="square" data-sz="14"></span></button>
      </div>
    </footer>
  </div>

  <div id="drag-right" class="drag-handle" title="拖拽调整工作区宽度"></div>

  <aside class="workspace-panel" id="workspace-panel">
    <header class="ws-header">
      <span class="ws-title">工作区</span>
      <span class="ws-actions">
        <button id="ws-preview-toggle" class="ws-ibtn" title="实时预览：在面板里渲染运行中的 dev server / 页面" aria-label="实时预览"><span class="ico" data-icon="eye" data-sz="13"></span></button>
        <button id="ws-refresh" class="ws-ibtn" title="刷新工作区" aria-label="刷新"><span class="ico" data-icon="refresh-cw" data-sz="13"></span></button>
        <button id="ws-collapse" class="ws-ibtn" title="折叠面板" aria-label="折叠面板"><span class="ico" data-icon="chevron-right" data-sz="16"></span></button>
      </span>
    </header>
    <div id="ws-path" class="ws-path" title="当前会话的工作区目录"><span class="ico" data-icon="folder" data-sz="14"></span><span id="ws-path-text" class="ws-path-text"></span></div>
    <div id="ws-tabs" class="ws-tabs"></div>
    <div class="ws-tabpanels">
      <div id="ws-tab-changes" class="ws-tabpanel" data-tab="changes">
        <div id="ws-changes" class="ws-changes"></div>
        <div id="ws-checkpoints" class="ws-checkpoints" hidden></div>
      </div>
      <div id="ws-tab-review" class="ws-tabpanel" data-tab="review">
        <div id="ws-review" class="ws-review" hidden></div>
      </div>
      <div id="ws-tab-files" class="ws-tabpanel" data-tab="files">
        <div id="ws-tree" class="ws-tree"></div>
      </div>
      <div id="ws-tab-preview" class="ws-tabpanel" data-tab="preview">
        <div id="ws-preview" class="ws-preview">
          <div class="ws-empty">点击文件预览</div>
        </div>
      </div>
    </div>
  </aside>
  <button id="ws-reopen" class="ws-reopen" title="展开工作区" aria-label="展开工作区" hidden><span class="ico" data-icon="chevron-left" data-sz="16"></span></button>

  <div id="cc-popover" class="cc-popover" hidden></div>

  <div id="settings-overlay" class="settings-overlay" hidden>
    <div class="settings-modal">
      <header class="settings-head">
        <span class="settings-title">设置</span>
        <button id="settings-close" class="settings-x" title="关闭" aria-label="关闭">
          <span class="ico" data-icon="x" data-sz="15"></span>
        </button>
      </header>
      <div class="settings-body">
        <nav class="prov-list" id="prov-list"></nav>
        <div class="prov-detail" id="prov-detail"></div>
      </div>
    </div>
  </div>

  <div id="shortcuts-overlay" class="settings-overlay" hidden>
    <div class="settings-modal shortcuts-modal">
      <header class="settings-head">
        <span class="settings-title">键盘快捷键</span>
        <button id="shortcuts-close" class="settings-x" title="关闭" aria-label="关闭">
          <span class="ico" data-icon="x" data-sz="15"></span>
        </button>
      </header>
      <div class="settings-body shortcuts-body" id="shortcuts-body"></div>
    </div>
  </div>

  <script src="icons.js"></script>
  <script src="pure.js"></script>
  <script src="app.js"></script>
</body>
</html>
